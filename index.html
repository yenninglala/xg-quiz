<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta property="og:title" content="你最像哪位 XG 成員？"/>
  <meta property="og:description" content="來自外太空的人格測驗，7 題找出你的 XG 本命"/>
  <meta property="og:image" content="assets/og-cover.png"/>
  <meta property="og:type" content="website"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <title>XG 人格測驗 — 來自外太空</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/result.css"/>
</head>
<body>

  <!-- Custom cursor -->
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <!-- Background FX -->
  <canvas id="starfield"></canvas>
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>
  <div class="result-bg-ring" id="result-bg-ring"></div>

  <div class="container">

    <!-- ── QUIZ SECTION ── -->
    <div id="quiz-section">
      <div class="header">
        <div class="signal">▸ SIGNAL DETECTED ◂ XG FREQUENCY 7.7Hz</div>
        <h1>
          <span class="line1">XG IDENTITY<br>SCAN</span>
          <span class="line2">你最像哪位成員？</span>
        </h1>
        <p class="subtitle">7 個問題 · 來自外太空的人格測驗</p>
      </div>

      <div class="member-orbit" id="member-orbit">
        <div class="member-node" style="background:var(--jurin)"  data-name="JURIN">J</div>
        <div class="member-node" style="background:var(--chisa)"  data-name="CHISA">C</div>
        <div class="member-node" style="background:var(--hinata)" data-name="HINATA">H</div>
        <div class="member-node" style="background:var(--harvey)" data-name="HARVEY">H</div>
        <div class="member-node" style="background:var(--juria)"  data-name="JURIA">J</div>
        <div class="member-node" style="background:var(--maya)"   data-name="MAYA">M</div>
        <div class="member-node" style="background:var(--cocona)" data-name="COCONA">C</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="prog-fill" style="width:0%"></div>
        </div>
        <span class="progress-num" id="prog-num">00/07</span>
      </div>

      <div class="card" id="q-card">
        <div class="card-inner">
          <div class="q-label" id="q-label">QUESTION_01</div>
          <div class="q-text"  id="q-text"></div>
          <div class="options" id="options-wrap"></div>
        </div>
      </div>

      <button class="next-btn" id="next-btn">TRANSMIT →</button>
    </div>

    <!-- ── RESULT SECTION ── -->
    <div id="result-section">
      <div class="result-card" id="result-card">
        <div class="result-avatar-wrap">
          <div class="avatar-ring" id="avatar-ring"></div>
          <div class="result-avatar" id="r-avatar"></div>
        </div>
        <div class="result-eyebrow">IDENTITY MATCH CONFIRMED</div>
        <div class="result-name"   id="r-name"></div>
        <div class="result-desc"   id="r-desc"></div>
        <div class="traits"        id="r-traits"></div>
      </div>

      <div class="share-section">
        <div class="share-title">▸ BROADCAST RESULT ◂</div>
        <div id="result-canvas-wrap">
          <canvas id="result-canvas"></canvas>
        </div>
        <div class="share-btns">
          <button class="share-btn line" id="btn-line">LINE</button>
          <button class="share-btn copy" id="btn-copy">COPY LINK</button>
          <button class="share-btn dl"   id="btn-dl">DOWNLOAD</button>
        </div>
        <button class="restart-btn" id="btn-restart">↺ RE-SCAN</button>
      </div>
    </div>

  </div><!-- /container -->

  <div class="toast" id="toast"></div>

  <!-- JS (order matters) -->
  <script src="js/data.js"></script>
  <script src="js/starfield.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/canvas-card.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/share.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
